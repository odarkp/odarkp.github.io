<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio on web</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Learning to play audio on web</h1>
    <!-- using "controls" in the audio function makes the controls for audio appear as a button -->
    <audio src="airport.mp3" controls id="airport-audio"></audio>
    <audio src="pop.mp3" id="pop-audio"></audio>

    <button id="play-button">play audio</button>
    <button id="pause-button">pause audio</button>
    <button id="pop-button">pop sound</button>
    <button id="play-pause-button"></button>
    <img
      id="play-pause-img"
      src="https://img.icons8.com/ios-glyphs/30/play--v2.png"
      alt="Play Button"
      width="10"
      height="10"
    />

    <p id="msg"></p>

    <video src="stardust.mp4" controls id="my-video"></video>
  </body>
</html>
