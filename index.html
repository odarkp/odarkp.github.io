    <h3>Music Video</h3>

    <h4>Put your headphones on and stay awhile.</h4>

    <!-- Main Content Section -->
    <main class="container">
      <!-- Media Player Section -->
      <div class="media-player">
        <video id="custom-video-player" controls>
          <source
            src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/miac.mp4"
            type="video/mp4"
          />
        </video>

        <div class="custom-controls">
          <button id="play-pause-btn" onclick="togglePlayPause()">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
              alt="Play Button"
              width="24"
              height="24"
            />
          </button>


          <!-- add the missing buttons or functionality here -->
            <button id="mute-unmute-button" class="double-border">
          <img
            src="https://img.icons8.com/ios-glyphs/30/no-audio--v1.png"
            alt=""
            id="mute-unmute-img"
          />
        </button>

          <button id="rewind-button" class="double-border">
          <img
            src="https://img.icons8.com/ios-glyphs/30/rewind.png"
            alt=""
            id="rewind-img"
          />
        </button>


        <button id="fast-forward-button" class="double-border">
          <img
            src="https://img.icons8.com/ios-glyphs/30/fast-forward.png"
            alt=""
            id="fast-forward-img"
          />
        </button>
       


        <div class="progress-bar">
            <span id="progress-bar-fill"></span>
          </div>


        <button id="fullscreen-button" class="double-border">
          <img
            src="https://img.icons8.com/ios-glyphs/30/full-screen--v1.png"
            alt=""
            id="fullscreen-img"
          />
        </button>


        <button id="heart-button" class="double-border">
          <img
            src="https://img.icons8.com/?size=36&id=DFU1kReSUccu&format=png&color=000000"
            alt=""
            id="fullscreen-img"
          />
        </button>
        <div id="likes"></div>
      </div>
          

      <!-- Additional Content Section -->
      <section>
        <h4>Additional Content</h4>
